params:
  env: production
  author: "Oriol Alàs Cercós"
  description: "Personal blog by Oriol Alàs Cercós, exploring AI, NLP, computer vision, and embeddings through hands-on research notes, practical guides, and reflections from real applied machine-learning work."
  homeInfoParams:
    Title: "Hi there 👋 | Oriol Alàs Cercós"
    Content: |
      Hi, I'm Oriol Alàs Cercós, an **AI Engineer and Researcher** 🔬 with a passion for **Machine Learning**, **Computer Vision**, and **Large Language Models** (LLMs).
      
      
      This blog is a personal notebook where I document projects, experiments, and ideas related to artificial intelligence, machine learning, and applied research.
  keywords: [ blog, page ]
  socialIcons: # optional
    - name: Github
      url: "https://github.com/oriolac/"
    - name: Linkedin
      url: "https://www.linkedin.com/in/oriolac/"
    - name: RSS
      url: "https://oriolac.github.io/index.xml"
    - name: Substack
      url: "https://oriolac.substack.com/subscribe"
    - name: GoogleScholar
      url: "https://scholar.google.com/citations?user=4-24-20&hl=en"

  ShowReadingTime: true
  ShowShareButtons: True
  ShareButtons: [ "linkedin", "twitter" ]
  ShowBreadCrumbs: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowFullTextinRSS: true
  ShowToc: true
  ShowRssButtonInSectionTermList: true
  publications:
    - text: "Alàs, O., Cervera, R., & Sanfeliu, R. (2026). **A Scalable Real-Time Multi-Camera Vehicle Tracking System for Urban Environments**. IEEE Access"
      link: "https://doi.org/10.1109/ACCESS.2026.3675896"
    - text: "Velasquez-Camacho, L., et al. (2025). **Monitoring temporal changes in large urban street trees using remote sensing and deep learning**. PLOS ONE."
      link: "https://doi.org/10.1371/journal.pone.0326562"
    - text: "Alàs, O., & Sebé, F. (2024). **Privacy-Preserving Electricity Trading for Connected Microgrids**. Applied Sciences."
      link: "https://doi.org/10.3390/app14041458"
  SiteDescription: Hi, I'm Oriol Alàs Cercós, an AI Engineer and Researcher 🔬 with a passion for Machine Learning, Data Science, and Large Language Models (LLMs). This blog is my space to document cool projects, share tips, and maybe even a few AI-generated funnies. 🥦 Stick around to see what I'm up to and maybe learn something new along the way! 🚀
  math: true

  fuseOpts:
    isCaseSensitive: false
  assets:
    favicon: "/icons8-broccoli-stickers-96.png"
    css:
      - css/projects.css
      - css/talks.css

markup:
  defaultMarkdownHandler: goldmark
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
            - - \[
              - \]
            - - $$
              - $$
          inline:
            - - \(
              - \)
        enable: true

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search

enableRobotsTXT: true
