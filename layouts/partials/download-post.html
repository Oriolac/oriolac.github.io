<div class="post-download">
  <button class="download-btn" onclick="window.print()" title="Print or save as PDF via your browser">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    <span>PDF</span>
  </button>
  <button class="download-btn"
    data-title="{{ .Title | htmlEscape }}"
    data-author="{{ site.Params.author | htmlEscape }}"
    data-date="{{ .Date | time.Format `2006-01-02` }}"
    data-lang="{{ site.Language.Lang }}"
    onclick="downloadEpub(this)"
    title="Download as ePub e-book">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    <span>ePub</span>
  </button>
</div>

<script>
(function () {
  async function downloadEpub(btn) {
    const label = btn.querySelector('span');
    const origLabel = label.textContent;
    label.textContent = '…';
    btn.disabled = true;

    try {
      if (!window.JSZip) {
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
          s.onload = resolve;
          s.onerror = () => reject(new Error('JSZip failed to load'));
          document.head.appendChild(s);
        });
      }

      const { title, author, date, lang } = btn.dataset;

      const contentEl = document.querySelector('.post-content');
      const clone = contentEl.cloneNode(true);
      clone.querySelectorAll('script, .copy-code, .anchor').forEach(el => el.remove());
      const body = clone.innerHTML
        .replace(/<br>/gi, '<br/>')
        .replace(/<hr>/gi, '<hr/>')
        .replace(/<img([^>]*)(?<!\/)>/gi, '<img$1/>');

      const uid = 'urn:uuid:' + ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
        (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));

      const zip = new JSZip();

      zip.file('mimetype', 'application/epub+zip', { compression: 'STORE' });

      zip.file('META-INF/container.xml',
`<?xml version="1.0" encoding="UTF-8"?>
<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">
  <rootfiles>
    <rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>
  </rootfiles>
</container>`);

      zip.file('OEBPS/content.opf',
`<?xml version="1.0" encoding="UTF-8"?>
<package version="3.0" xmlns="http://www.idpf.org/2007/opf" unique-identifier="bookid" xml:lang="${lang}">
  <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">
    <dc:identifier id="bookid">${uid}</dc:identifier>
    <dc:title>${title}</dc:title>
    <dc:creator>${author}</dc:creator>
    <dc:date>${date}</dc:date>
    <dc:language>${lang}</dc:language>
    <meta property="dcterms:modified">${date}T00:00:00Z</meta>
  </metadata>
  <manifest>
    <item id="nav"     href="nav.xhtml"     media-type="application/xhtml+xml" properties="nav"/>
    <item id="chapter" href="chapter.xhtml" media-type="application/xhtml+xml"/>
    <item id="css"     href="style.css"     media-type="text/css"/>
  </manifest>
  <spine><itemref idref="chapter"/></spine>
</package>`);

      zip.file('OEBPS/nav.xhtml',
`<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" xml:lang="${lang}">
<head><meta charset="UTF-8"/><title>${title}</title></head>
<body>
  <nav epub:type="toc" id="toc">
    <ol><li><a href="chapter.xhtml">${title}</a></li></ol>
  </nav>
</body>
</html>`);

      zip.file('OEBPS/chapter.xhtml',
`<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="${lang}">
<head>
  <meta charset="UTF-8"/>
  <title>${title}</title>
  <link rel="stylesheet" type="text/css" href="style.css"/>
</head>
<body>
<h1>${title}</h1>
<p class="post-meta">${author} &#x2022; ${date}</p>
<div class="post-body">${body}</div>
</body>
</html>`);

      zip.file('OEBPS/style.css',
`body{font-family:Georgia,serif;line-height:1.7;margin:1.5em 2em;color:#222}
h1{font-size:2em;line-height:1.2;margin-bottom:.3em}
h2{font-size:1.5em;margin-top:1.5em}
h3{font-size:1.2em;margin-top:1.2em}
.post-meta{color:#666;font-size:.9em;margin-bottom:2em;border-bottom:1px solid #ddd;padding-bottom:.8em}
p{margin:.8em 0}
pre{background:#f4f4f4;padding:1em;overflow-x:auto;border-radius:4px;font-size:.85em;white-space:pre-wrap}
code{background:#f4f4f4;padding:.15em .4em;border-radius:2px;font-size:.85em}
pre code{background:none;padding:0}
blockquote{border-left:3px solid #ccc;margin-left:0;padding-left:1em;color:#555}
img{max-width:100%}
a{color:#0077cc}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ddd;padding:.4em .6em;text-align:left}
th{background:#f0f0f0}`);

      const blob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = title.replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '-').toLowerCase() + '.epub';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 30000);
    } catch (e) {
      console.error('ePub generation failed:', e);
      alert('ePub generation failed. Please try again.');
    } finally {
      label.textContent = origLabel;
      btn.disabled = false;
    }
  }

  window.downloadEpub = downloadEpub;
})();
</script>
