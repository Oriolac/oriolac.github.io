{{- $url := .Get "url" -}}
{{- $inner := .Inner | strings.TrimSpace -}}<div class="callout callout-seealso" role="complementary">
  <div class="callout-icon" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
  </div>
  <div class="callout-body">
    <p class="callout-title">See also</p>
    {{- if $url }}
    <a href="{{ $url }}" class="callout-seealso-link">{{ $inner }} <span aria-hidden="true">→</span></a>
    {{- else }}
    <span class="callout-seealso-link">{{ $inner }}</span>
    {{- end }}
  </div>
</div>
